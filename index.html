<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Refuge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #03040a;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            color: #c0c8d8;
            cursor: default;
        }

        canvas {
            display: block;
        }

        /* --- HUD Shared --- */
        .hud-panel {
            position: fixed;
            font-family: inherit;
            color: #c0c8d8;
            background: rgba(3, 4, 10, 0.85);
            border-radius: 0;
            pointer-events: auto;
            z-index: 10;
        }

        /* --- Bottom HUD Bar --- */
        #hud-bottom {
            bottom: 0;
            left: 0;
            right: 0;
            display: none; /* shown by HUDUIComponent.init() */
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            border-top: 1px solid rgba(79, 168, 255, 0.2);
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        #hud-bottom.visible {
            display: flex;
        }

        #hud-date {
            min-width: 140px;
            white-space: nowrap;
        }

        .hud-btn {
            background: transparent;
            color: #4fa8ff;
            border: 1px solid rgba(79, 168, 255, 0.4);
            padding: 6px 18px;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, opacity 0.15s;
        }

        .hud-btn:hover {
            border-color: #4fa8ff;
            color: #ffffff;
        }

        .hud-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* --- Ship Info Panel --- */
        #ship-info-panel {
            top: 80px;
            right: 0;
            width: 280px;
            padding: 20px;
            border-left: 1px solid rgba(79, 168, 255, 0.2);
            border-bottom: 1px solid rgba(79, 168, 255, 0.2);
            transform: translateX(100%);
            transition: transform 0.25s ease-out, width 0.25s ease-out;
            font-size: 13px;
            line-height: 1.6;
        }

        #ship-info-panel.open {
            transform: translateX(0);
        }

        #ship-info-panel .ship-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        #ship-info-panel .ship-name {
            font-size: 15px;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #ship-info-panel .rename-btn {
            background: none;
            border: none;
            color: rgba(79, 168, 255, 0.6);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 4px;
            font-family: inherit;
        }

        #ship-info-panel .rename-btn:hover {
            color: #4fa8ff;
        }

        #ship-info-panel .rename-input {
            background: rgba(79, 168, 255, 0.08);
            border: 1px solid rgba(79, 168, 255, 0.3);
            color: #ffffff;
            font-family: inherit;
            font-size: 14px;
            padding: 4px 8px;
            width: 170px;
            outline: none;
        }

        #ship-info-panel .rename-input:focus {
            border-color: #4fa8ff;
        }

        #ship-info-panel .rename-ok {
            background: none;
            border: 1px solid rgba(79, 168, 255, 0.3);
            color: #4fa8ff;
            font-family: inherit;
            font-size: 11px;
            padding: 4px 10px;
            cursor: pointer;
        }

        #ship-info-panel .divider {
            border: none;
            border-top: 1px solid rgba(192, 200, 216, 0.15);
            margin: 12px 0;
        }

        #ship-info-panel .lore-text {
            font-size: 12px;
            opacity: 0.6;
            line-height: 1.7;
        }

        #ship-info-panel .crew-count {
            margin-top: 16px;
            font-size: 13px;
        }

        #ship-info-panel .crew-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #44cc66;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        #ship-info-panel .ship-range-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
        }

        #ship-info-panel .ship-range-label {
            font-size: 11px;
            opacity: 0.6;
        }

        #ship-info-panel .ship-range-bar {
            flex: 1;
            height: 6px;
            background: rgba(192, 200, 216, 0.1);
            overflow: hidden;
        }

        #ship-info-panel .ship-range-fill {
            height: 100%;
            width: 100%;
            background: #44cc66;
            transition: width 0.15s ease-out;
        }

        #ship-info-panel .ship-range-text {
            min-width: 70px;
            text-align: right;
            font-size: 12px;
            opacity: 0.8;
        }

        /* --- Panel Close Button --- */
        #ship-info-panel .panel-close-btn {
            position: absolute;
            top: 8px;
            right: 10px;
            background: none;
            border: none;
            color: rgba(192, 200, 216, 0.5);
            font-size: 18px;
            cursor: pointer;
            font-family: inherit;
            padding: 2px 6px;
        }

        #ship-info-panel .panel-close-btn:hover {
            color: #ffffff;
        }

        /* --- Panel Width Transition --- */
        #ship-info-panel.wide {
            width: 340px;
        }

        /* --- Planet Info Panel --- */
        #planet-info-panel {
            top: 80px;
            right: 0;
            width: 280px;
            padding: 20px;
            border-left: 1px solid rgba(79, 168, 255, 0.2);
            border-bottom: 1px solid rgba(79, 168, 255, 0.2);
            transform: translateX(100%);
            transition: transform 0.25s ease-out;
            font-size: 13px;
            line-height: 1.6;
        }

        #planet-info-panel.open {
            transform: translateX(0);
        }

        #planet-info-panel .panel-close-btn {
            position: absolute;
            top: 8px;
            right: 10px;
            background: none;
            border: none;
            color: rgba(192, 200, 216, 0.5);
            font-size: 18px;
            cursor: pointer;
            font-family: inherit;
            padding: 2px 6px;
        }

        #planet-info-panel .panel-close-btn:hover {
            color: #ffffff;
        }

        #planet-info-panel .ship-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        #planet-info-panel .ship-name {
            font-size: 15px;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #planet-info-panel .divider {
            border: none;
            border-top: 1px solid rgba(192, 200, 216, 0.15);
            margin: 12px 0;
        }

        #planet-info-panel .lore-text {
            font-size: 12px;
            opacity: 0.6;
            line-height: 1.7;
        }

        .planet-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .surface-tooltip {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(3, 4, 10, 0.95);
            border: 1px solid rgba(79, 168, 255, 0.3);
            color: rgba(192, 200, 216, 0.8);
            font-size: 10px;
            padding: 4px 10px;
            white-space: nowrap;
            pointer-events: none;
        }

        .planet-status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ccaa44;
        }

        /* --- Sub-view Containers --- */
        #ship-info-panel .view-section {
            display: none;
        }

        #ship-info-panel .view-section.active {
            display: block;
        }

        /* --- Crew Manifest List --- */
        .crew-manifest-list {
            max-height: calc(100vh - 320px);
            overflow-y: auto;
            margin-top: 8px;
            padding-right: 8px;
        }

        .crew-manifest-list::-webkit-scrollbar {
            width: 4px;
        }

        .crew-manifest-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .crew-manifest-list::-webkit-scrollbar-thumb {
            background: rgba(79, 168, 255, 0.2);
        }

        .crew-manifest-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 4px 6px;
            font-size: 10px;
            opacity: 0.4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(79, 168, 255, 0.15);
            margin-right: 8px;
        }

        .crew-manifest-header .crew-name {
            flex: 1;
        }

        .crew-manifest-header .crew-role {
            width: 70px;
        }

        .crew-manifest-header .crew-morale-dot {
            width: 6px;
        }

        .crew-manifest-header .crew-age {
            width: 24px;
            text-align: right;
        }

        .crew-manifest-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 4px;
            cursor: pointer;
            border-bottom: 1px solid rgba(192, 200, 216, 0.06);
            font-size: 12px;
            transition: background 0.15s;
        }

        .crew-manifest-row:hover {
            background: rgba(79, 168, 255, 0.08);
        }

        .crew-manifest-row .crew-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .crew-manifest-row .crew-role {
            width: 70px;
            font-size: 11px;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .crew-manifest-row .crew-morale-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .crew-manifest-row .crew-age {
            width: 24px;
            text-align: right;
            font-size: 11px;
            opacity: 0.6;
        }

        /* --- Back Button --- */
        .panel-back-btn {
            background: none;
            border: none;
            color: rgba(79, 168, 255, 0.7);
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            padding: 0;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel-back-btn:hover {
            color: #4fa8ff;
        }

        /* --- Crew Detail Panel --- */
        .crew-detail-name {
            font-size: 16px;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .crew-detail-meta {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 12px;
        }

        .crew-detail-traits {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .crew-trait-tag {
            font-size: 11px;
            padding: 2px 8px;
            border: 1px solid rgba(79, 168, 255, 0.3);
            color: #4fa8ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .crew-morale-section {
            margin-bottom: 14px;
        }

        .crew-morale-label {
            font-size: 11px;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .crew-morale-value {
            font-size: 12px;
            margin-left: 8px;
        }

        .crew-morale-bar {
            height: 6px;
            background: rgba(192, 200, 216, 0.1);
            margin-top: 4px;
        }

        .crew-morale-fill {
            height: 100%;
            transition: width 0.15s ease-out;
        }

        .crew-relationships-header {
            font-size: 11px;
            opacity: 0.5;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .crew-relationship-row {
            padding: 8px 0;
            border-bottom: 1px solid rgba(192, 200, 216, 0.06);
            font-size: 12px;
        }

        .crew-relationship-row .rel-name {
            color: #4fa8ff;
            cursor: pointer;
        }

        .crew-relationship-row .rel-name:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        .crew-relationship-row .rel-type {
            font-size: 11px;
            opacity: 0.5;
            text-transform: uppercase;
            margin-left: 6px;
        }

        .crew-relationship-row .rel-desc {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 2px;
            line-height: 1.5;
        }

        /* --- Planet View Back Button --- */
        #planet-view-back {
            position: fixed;
            top: 24px;
            left: 24px;
            display: none;
            background: none;
            border: 1px solid rgba(79, 168, 255, 0.4);
            color: #4fa8ff;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 8px 18px;
            cursor: pointer;
            z-index: 20;
            transition: border-color 0.15s, color 0.15s;
        }

        #planet-view-back:hover {
            border-color: #4fa8ff;
            color: #ffffff;
        }

        /* --- Colonise Button --- */
        #colonise-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: rgba(212, 160, 32, 0.15);
            border: 1px solid #d4a020;
            color: #d4a020;
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 32px;
            cursor: pointer;
            z-index: 20;
            transition: background 0.15s, color 0.15s;
        }

        #colonise-btn:hover {
            background: rgba(212, 160, 32, 0.3);
            color: #ffffff;
        }

        /* --- Colonise Confirmation Modal --- */
        #colonise-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(3, 4, 10, 0.8);
            z-index: 30;
        }

        .colonise-modal-box {
            background: rgba(3, 4, 10, 0.95);
            border: 1px solid rgba(79, 168, 255, 0.3);
            padding: 32px 40px;
            max-width: 420px;
            text-align: center;
        }

        .colonise-modal-box .modal-title {
            font-size: 14px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .colonise-modal-box .modal-desc {
            font-size: 12px;
            opacity: 0.7;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .colonise-modal-box .modal-biome {
            color: #d4a020;
            font-size: 13px;
        }

        .colonise-modal-box .modal-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .colonise-modal-box .modal-btn {
            background: transparent;
            border: 1px solid rgba(79, 168, 255, 0.4);
            color: #4fa8ff;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 8px 24px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }

        .colonise-modal-box .modal-btn:hover {
            border-color: #4fa8ff;
            color: #ffffff;
        }

        .colonise-modal-box .modal-btn.confirm {
            border-color: #d4a020;
            color: #d4a020;
        }

        .colonise-modal-box .modal-btn.confirm:hover {
            background: rgba(212, 160, 32, 0.15);
            color: #ffffff;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud-bottom" class="hud-panel"></div>
    <div id="ship-info-panel" class="hud-panel"></div>
    <div id="planet-info-panel" class="hud-panel"></div>

    <!-- Planet View UI -->
    <button id="planet-view-back" type="button">&#8592; SYSTEM MAP</button>
    <button id="colonise-btn" type="button">COLONISE</button>
    <div id="colonise-modal">
        <div class="colonise-modal-box">
            <div class="modal-title">ESTABLISH COLONY</div>
            <div class="modal-desc">
                Establish first colony on <span id="colonise-modal-biome" class="modal-biome"></span> terrain?
                This will commit 50 souls to the surface.
            </div>
            <div class="modal-actions">
                <button id="colonise-modal-cancel" class="modal-btn" type="button">CANCEL</button>
                <button id="colonise-modal-confirm" class="modal-btn confirm" type="button">CONFIRM</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
