<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Last Refuge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud-resource-bar" class="hud-panel"></div>
    <div id="hud-bottom" class="hud-panel"></div>
    <div id="ship-info-panel" class="hud-panel"></div>
    <div id="planet-info-panel" class="hud-panel"></div>

    <!-- Planet View UI -->
    <button id="planet-view-back" type="button">&#8592; SYSTEM MAP</button>
    <button id="colonise-btn" type="button">COLONISE</button>
    <div id="colonise-modal">
        <div class="colonise-modal-box">
            <div class="modal-title">ESTABLISH COLONY</div>
            <div class="modal-desc">
                Establish first colony on <span id="colonise-modal-biome" class="modal-biome"></span> terrain?
                This will commit 50 souls to the surface.
            </div>
            <div class="modal-actions">
                <button id="colonise-modal-cancel" class="modal-btn" type="button">CANCEL</button>
                <button id="colonise-modal-confirm" class="modal-btn confirm" type="button">CONFIRM</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
