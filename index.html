<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Refuge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #03040a;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            color: #c0c8d8;
            cursor: default;
        }

        canvas {
            display: block;
        }

        /* --- HUD Shared --- */
        .hud-panel {
            position: fixed;
            font-family: inherit;
            color: #c0c8d8;
            background: rgba(3, 4, 10, 0.85);
            border-radius: 0;
            pointer-events: auto;
            z-index: 10;
        }

        /* --- Bottom HUD Bar --- */
        #hud-bottom {
            bottom: 0;
            left: 0;
            right: 0;
            display: none; /* shown by HUDUIComponent.init() */
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            border-top: 1px solid rgba(79, 168, 255, 0.2);
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        #hud-bottom.visible {
            display: flex;
        }

        #hud-date {
            min-width: 140px;
            white-space: nowrap;
        }

        .hud-btn {
            background: transparent;
            color: #4fa8ff;
            border: 1px solid rgba(79, 168, 255, 0.4);
            padding: 6px 18px;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, opacity 0.15s;
        }

        .hud-btn:hover {
            border-color: #4fa8ff;
            color: #ffffff;
        }

        .hud-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* --- Ship Info Panel --- */
        #ship-info-panel {
            top: 80px;
            right: 0;
            width: 280px;
            padding: 20px;
            border-left: 1px solid rgba(79, 168, 255, 0.2);
            border-bottom: 1px solid rgba(79, 168, 255, 0.2);
            transform: translateX(100%);
            transition: transform 0.25s ease-out;
            font-size: 13px;
            line-height: 1.6;
        }

        #ship-info-panel.open {
            transform: translateX(0);
        }

        #ship-info-panel .ship-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        #ship-info-panel .ship-name {
            font-size: 15px;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #ship-info-panel .rename-btn {
            background: none;
            border: none;
            color: rgba(79, 168, 255, 0.6);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 4px;
            font-family: inherit;
        }

        #ship-info-panel .rename-btn:hover {
            color: #4fa8ff;
        }

        #ship-info-panel .rename-input {
            background: rgba(79, 168, 255, 0.08);
            border: 1px solid rgba(79, 168, 255, 0.3);
            color: #ffffff;
            font-family: inherit;
            font-size: 14px;
            padding: 4px 8px;
            width: 170px;
            outline: none;
        }

        #ship-info-panel .rename-input:focus {
            border-color: #4fa8ff;
        }

        #ship-info-panel .rename-ok {
            background: none;
            border: 1px solid rgba(79, 168, 255, 0.3);
            color: #4fa8ff;
            font-family: inherit;
            font-size: 11px;
            padding: 4px 10px;
            cursor: pointer;
        }

        #ship-info-panel .divider {
            border: none;
            border-top: 1px solid rgba(192, 200, 216, 0.15);
            margin: 12px 0;
        }

        #ship-info-panel .lore-text {
            font-size: 12px;
            opacity: 0.6;
            line-height: 1.7;
        }

        #ship-info-panel .crew-count {
            margin-top: 16px;
            font-size: 13px;
        }

        #ship-info-panel .crew-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #44cc66;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        #ship-info-panel .ship-range-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
        }

        #ship-info-panel .ship-range-label {
            font-size: 11px;
            opacity: 0.6;
        }

        #ship-info-panel .ship-range-bar {
            flex: 1;
            height: 6px;
            background: rgba(192, 200, 216, 0.1);
            overflow: hidden;
        }

        #ship-info-panel .ship-range-fill {
            height: 100%;
            width: 100%;
            background: #44cc66;
            transition: width 0.15s ease-out;
        }

        #ship-info-panel .ship-range-text {
            min-width: 70px;
            text-align: right;
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud-bottom" class="hud-panel"></div>
    <div id="ship-info-panel" class="hud-panel"></div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
